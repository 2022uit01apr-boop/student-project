<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task assigned by surya bro</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            width: 850px;
            background-color: white;
            padding: 40px;
            border-left: 4px solid #3d3741;
        }

        .row{
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-box{
            width: 100%;
        }

        label{
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
            color: #40514e;
            font-weight: bold;
        }

        input,
        textarea,
        select{
            width: 100%;
            padding: 16px;
            border: 2px solid #d3d3d3;
            font-size: 18px;
            outline: none;
        }

        textarea{
            resize: none;
            height: 120px;
        }

        .privacy{
            margin-top: 35px;
            margin-bottom: 35px;
            color: #6d7a78;
            font-size: 16px;
            line-height: 28px;
        }

        .privacy a{
            color: #40514e;
        }

        button{
            width: 100%;
            padding: 18px;
            background-color: #05441d;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background-color: #063a3f;
        }

    </style>
</head>

<body>

    <div class="container">

        <form>

            <div class="row">

                <div class="input-box">
                    <label>First name</label>
                    <input type="text">
                </div>

                <div class="input-box">
                    <label>Last name</label>
                    <input type="text">
                </div>

            </div>


            <div class="input-box">
                <label>Work Email</label>
                <input type="email">
            </div>

            <br>


            <div class="input-box">
                <label>Message</label>
                <textarea></textarea>
            </div>

            <br>


            <div class="input-box">
                <label>Country</label>

                <select>
                    <option>India</option>
                    <option>USA</option>
                    <option>Canada</option>
                    <option>UK</option>
                </select>
            </div>


            <p class="privacy">

                By submitting my personal data, I consent to Zendesk
                collecting, processing, and storing my information in
                accordance with the

                <a href="#">Zendesk Privacy Notice.</a>

            </p>


            <button type="submit">Submit</button>

        </form>

    </div>

</body>
</html>
